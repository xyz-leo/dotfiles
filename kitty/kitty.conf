#: Font -------------------------------------------------------

font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 13.5

disable_ligatures never

#: Cursor -----------------------------------------------------

cursor_shape     beam
cursor_blink_interval 0.5

#: Scrollback -------------------------------------------------

scrollback_lines 10000

#: Mouse -------------------------------------------------------

mouse_hide_wait 3.0
copy_on_select yes

#: Window -------------------------------------------------------

window_padding_width 10
hide_window_decorations no

#: Background & Transparency -------------------------------------

background_opacity 0.85
background_blur 32
dynamic_background_opacity yes

#: Tab bar --------------------------------------------------------

tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{title}"

#: Bell -------------------------------------------------------

enable_audio_bell no

#: Color scheme: Ruby Noir (dark, muted red/ruby accents) --------

foreground #e0d4d4
background #120d0e

cursor            #b83b4b
cursor_text_color #120d0e

selection_foreground #120d0e
selection_background #b83b4b

url_color #d97a86

# black
color0  #1a1314
color8  #4a3638

# red
color1  #b83b4b
color9  #d9525f

# green
color2  #7a9b6e
color10 #93b686

# yellow
color3  #c9a35f
color11 #e0bd7a

# blue
color4  #7a8bb0
color12 #93a5c9

# magenta
color5  #a15c72
color13 #c17690

# cyan
color6  #6ea3a3
color14 #8bc2c2

# white
color7  #c9b8b9
color15 #e0d4d4

active_border_color   #b83b4b
inactive_border_color #4a3638

active_tab_foreground   #120d0e
active_tab_background   #b83b4b
inactive_tab_foreground #c9b8b9
inactive_tab_background #1a1314

mark1_foreground #120d0e
mark1_background #d9525f

#: Layouts ----------------------------------------------------

enabled_layouts splits,stack,tall,fat

#: Keybindings: window splits & navigation -----------------------

map alt+shift+d launch --location=hsplit
map alt+shift+r launch --location=vsplit

# move focus between panes
map alt+left  neighboring_window left
map alt+right neighboring_window right
map alt+up    neighboring_window up
map alt+down  neighboring_window down

# resize the focused pane
map alt+shift+left  resize_window narrower
map alt+shift+right resize_window wider
map alt+shift+up    resize_window taller
map alt+shift+down  resize_window shorter
map alt+ctrl+r      resize_window reset

# close / zoom / cycle panes
map alt+w close_window
map alt+z toggle_layout stack
map alt+] next_window
map alt+[ previous_window

# move a pane's position within the layout
map ctrl+alt+left  move_window left
map ctrl+alt+right move_window right
map ctrl+alt+up    move_window up
map ctrl+alt+down  move_window down

#: Keybindings: tabs ---------------------------------------------

map super+t new_tab
map alt+shift+w close_tab
map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+shift+bracket_right next_tab
map alt+shift+bracket_left previous_tab
map alt+shift+t set_tab_title

#: Keybindings: font size & misc ----------------------------------

map alt+plus  change_font_size all +1.0
map alt+minus change_font_size all -1.0
map alt+0     change_font_size all 0

map alt+shift+f5 load_config_file
map alt+shift+e edit_config_file

#: Misc -------------------------------------------------------

confirm_os_window_close 0
